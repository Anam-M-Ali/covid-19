name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Decode SSH private key
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY_BASE64 }}" | base64 -d > key.pem
        chmod 600 key.pem
        echo "Key decoded successfully"

    - name: Debug SSH connection
      run: |
        echo "Connecting to EC2..."
        ssh -vvv -i key.pem -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo CONNECTED"


